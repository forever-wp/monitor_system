  - name: "localization_ekf"
    supervisor: 1
    safety_system: 2
    nodes:
      - "ekf_filter_node"
    watch_topics:
      - name: "/odometry/filtered"
        # min_hz: 10.0
      # - name: "/tf"
      #   min_hz: 10.0


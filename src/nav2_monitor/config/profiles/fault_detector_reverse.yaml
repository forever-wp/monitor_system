# ============================================================
# nav2_monitor 故障检测配置
# Reverse 任务安全配置模板：强化倒车后向保护
# ============================================================

multi_value_judge:
  trigger_count: 2  # 同一规则连续异常多少次后才正式触发
  recover_count: 2  # 同一规则连续恢复多少次后才正式清除

# ============================================================
# 碰撞检测（轻量版 LaserScan + 区域）
# ============================================================
collision_detection:
  enabled: 1  # 是否启用碰撞检测
  module_name: "collision_detection"  # 碰撞故障输出时使用的模块名
  scan_topic: "scan"  # LaserScan 输入 topic
  pointcloud_topic: "/livox/points"  # PointCloud2 输入 topic
  voxel_topic: ""  # collision_voxel_layer/VoxelGrid 统一体素输入；非空时 zone/TTC 优先使用该源
  ultrasonic_topic: "/ultrasonic_eight"  # 超声波 JSON 输入 topic
  prediction_speed_topic: "/cmd_vel"  # 动态 TTC 预测速度兼容主 topic；navigation 未单独配置时回退使用
  control_source_state_topic: "/control_source_state"  # 当前控制源状态 topic
  prediction_speed_navigation_topic: "/cmd_vel"  # 导航 TTC 预测速度 topic
  prediction_speed_miniapp_topic: "/cmd_vel_miniapp"  # 小程序 TTC 预测速度 topic
  prediction_speed_remote_topic: "/cmd_vel_remote"  # 远程驾驶 TTC 预测速度 topic
  prediction_speed_other_topic: "/cmd_vel_other"  # 其他控制源 TTC 预测速度 topic
  ttc_visualization_enabled: 1  # 是否发布 TTC 预测可视化 MarkerArray
  ultrasonic_distances_key: "distances"   # JSON 中 8 路距离数组的键名
  ultrasonic_blind_distance: 0.2  # 超声盲区下限，小于此值按该值处理
  ultrasonic_out_of_range_value: 1.0  # 超声超量程值，达到该值视为“无障碍点”
  pointcloud_min_height: 0.2  # 点云参与碰撞检测的最小高度（米）
  pointcloud_max_height: 1.4  # 点云参与碰撞检测的最大高度（米）
  voxel_min_occupancy: 0.35  # 参与 zone/TTC 的最小体素占用权重
  voxel_min_height: 0.2  # 参与 zone/TTC 的体素最小高度（米）
  voxel_max_height: 1.4  # 参与 zone/TTC 的体素最大高度（米）
  source_timeout_s: 0.5  # 各碰撞数据源的有效超时时间（秒）
  direction_speed_threshold: 0.05  # 前后向判断阈值；绝对值低于该值时保持当前稳定方向，未建立稳定方向时仅匹配 both 区域
  direction_confirm_count: 3  # 方向切换确认帧数；连续收到相反方向速度达到该次数后才切换
  footprint_points: [-0.37, -0.28, -0.37, 0.28, 0.37, 0.28, 0.37, -0.28]  # 车体 footprint，用于 TTC 计算时扣除车体范围
  ultrasonic_widget: [0.35, 0.35, 0.35, 0.7, 0.95, 1.0, 0.95, 0.7]  # 倒车任务：后向优先，侧后次之
  # zones 字段说明见主配置 fault_detector_config.yaml，对所有任务 profile 含义一致
  zones:
    - name: "rear_ttc"
      enabled: 1
      model: "ttc"
      motion_direction: "reverse"
      level: "WARNING"
      safety_system: 1
      safety_slow_down_percentage: 45.0
      time_before_collision: 3.0
      recover_time_before_collision: 3.5
      min_hold_time_s: 0.2
      ttc_horizon_s: 3.5
      corridor_margin: 0.10
      candidate_downsample_resolution: 0.08
      actions: ["safety_system"]
    - name: "rear_slow"
      enabled: 1
      motion_direction: "reverse"
      points: [-0.05, 0.35, -0.05, -0.35, -0.75, -0.35, -0.75, 0.35]
      min_points: 2.0
      level: "ERROR"
      safety_system: 1
      safety_slow_down_percentage: 20.0
      actions: ["safety_system"]
      visualize: 1
      polygon_pub_topic: "/nav2_monitor/collision_zone/rear_slow"
    - name: "rear_stop"
      enabled: 1
      motion_direction: "reverse"
      points: [0.0, 0.25, 0.0, -0.25, -0.45, -0.25, -0.45, 0.25]
      min_points: 1.5
      level: "CRITICAL"
      safety_system: 2
      actions: ["safety_system"]
      visualize: 1
      polygon_pub_topic: "/nav2_monitor/collision_zone/rear_stop"

# ============================================================
# 底盘停留原地 / 反馈异常检测 (全局)
# ============================================================
chassis_stationary:
  enabled: 1  # 是否启用底盘异常/久停检测
  module_name: "chassis_stationary"  # 底盘故障输出时使用的模块名
  command_topic: "/command"  # 被监控的最终控制命令 topic
  moto_topic: "/moto_info"  # 电机反馈 topic，仅作为辅助旁证
  odom_topic: ""   # 已不作为主真值；保留可选回退
  imu_topic: "/livox/imu"  # IMU topic，作为底盘是否真的在动的主判断依据
  source_timeout_s: 1.0  # 输入源数据超时时间（秒）
  idle_timeout_s: 30.0  # command 和 moto 都静默多久后认为“久停”
  command_speed_threshold: 0.05  # command 认为“有速度”的阈值
  moto_speed_threshold: 0.05  # moto 认为“有速度”的阈值
  odom_speed_threshold: 0.03  # odom 认为“有速度”的阈值
  imu_speed_threshold: 0.03  # IMU 积分速度认为“有速度”的阈值
  imu_yaw_rate_threshold: 0.08  # IMU 角速度认为“在转动”的阈值
  imu_static_command_threshold: 0.02  # 低于该命令速度时认为处于静止/可校准状态
  imu_bias_calibration_samples: 50  # IMU 偏置校准所需样本数
  imu_decay_rate: 0.98  # IMU 积分速度衰减系数
  anomaly_level: "ERROR"  # command/moto 异常时的故障等级
  idle_level: "WARNING"  # 久停时的故障等级
  safety_system: 2  # 触发安全动作时默认执行 SOFT_STOP
  safety_slow_down_percentage: 50.0  # 若安全动作为减速时使用的百分比
  anomaly_actions: ["safety_system", "supervisor"]  # 异常触发后的动作列表
  idle_actions: ["none"]  # 久停触发后的动作列表

# ============================================================
# 模块定义
# ============================================================
# modules 通用字段说明见主配置 fault_detector_config.yaml，对所有任务 profile 含义一致
modules:

  # ----------------------------------------------------------
  # 1. chassis_node — 底盘电机驱动
  #    节点: /chassis_node
  #    发布: /moto_info, /encoder_info, /is_emergency_stop
  #    订阅: /command, /joy
  # ----------------------------------------------------------
  - name: "chassis_node"
    supervisor: 1
    safety_system: 2
    nodes:
      - "chassis_node"
    watch_topics:   # 若未配置 min_hz，则只检测有无，不做频率阈值判断
      - name: "/moto_info"
        min_hz: 10.0
      - name: "/encoder_info"
        min_hz: 10.0

  # ----------------------------------------------------------
  # 2. chassid_odometry_node — 底盘里程计
  #    节点: /odometry_node
  #    发布: /odom_init, /odom_base, /odom_vel, /tf, /wheel_velocity
  #    订阅: /moto_info, /is_emergency_stop
  # ----------------------------------------------------------
  - name: "chassid_odometry_node"
    supervisor: 1
    safety_system: 2
    nodes:
      - "odometry_node"
    watch_topics:
      - name: "/odom_init"
        # min_hz: 10.0
      - name: "/odom_base"
        min_hz: 10.0

  # ----------------------------------------------------------
  # 3. battery_node — 电池状态
  #    节点: /battery_node
  #    发布: /battery_state
  # ----------------------------------------------------------
  - name: "battery_node"
    supervisor: 0
    safety_system: 2
    nodes:
      - "battery_node"
    watch_topics:
      - name: "/battery_state"
        # min_hz: 0.001
    # feedback_rules:
    #   - source_topic: "/battery_state"
    #     metric_name: "voltage"
    #     min_value: 20.0
    #     level: "WARNING"
    #     max_stale_s: 150.0
    #     actions: ["supervisor"]
    #   - source_topic: "/battery_state"
    #     metric_name: "percentage"
    #     min_value: 0.10
    #     level: "ERROR"
    #     max_stale_s: 150.0
    #     actions: ["safety_system", "supervisor"]

  # ----------------------------------------------------------
  # 4. livox — 激光雷达驱动 (livox MID-360)
  #    节点: /livox_lidar_publisher (livox_ros_driver2)
  #    发布: /livox/lidar (CustomMsg), /livox/imu (Imu)
  # ----------------------------------------------------------
  - name: "livox"
    supervisor: 1
    safety_system: 2
    nodes:
      - "livox_lidar_publisher"   # 监测实际系统时替换为 "livox_lidar_publisher"
    watch_topics:
      - name: "/livox/points"
        min_hz: 5.0
      - name: "/livox/imu"
        min_hz: 150.0

  # ----------------------------------------------------------
  # 5. usb_cam — USB 摄像头
  #    节点: /front_camera, /back_camera, /left_camera, /right_camera
  #    发布: /front_camera/image_raw, /back_camera/image_raw,
  #         /left_camera/image_raw, /right_camera/image_raw
  # ----------------------------------------------------------
  - name: "usb_cam"
    supervisor: 0
    safety_system: 0
    nodes:
      - "front_camera"
      - "back_camera"
      #- "left_camera"
      #- "right_camera"
    watch_topics:
      - name: "/front_camera/image_raw"
        min_hz: 5.0
      - name: "/back_camera/image_raw"
        min_hz: 5.0
      #- name: "/left_camera/image_raw"
      #  min_hz: 5.0
      #- name: "/right_camera/image_raw"
      #  min_hz: 5.0

  # ----------------------------------------------------------
  # 6. rgbd_cam — RGBD 深度相机 (Orbbec)
  #    节点: /camera/camera (orbbec_camera_node)
  #    发布: /camera/color/image_raw, /camera/depth/image_raw
  # ----------------------------------------------------------
  - name: "rgbd_cam"
    supervisor: 1
    safety_system: 2
    nodes:
      - "camera/camera"
    watch_topics:
      - name: "/camera/color/image_raw"
        # min_hz: 5.0
      - name: "/camera/depth/image_raw"
        # min_hz: 5.0

  # ----------------------------------------------------------
  # 7. uitrasonic — 超声波传感器 (8路聚合单 topic)
  #    节点: /uss_driver_publisher
  #    发布: /ultrasonic_eight (JSON: 场景 bool + 8 路距离数组)
  #    订阅: /elevator_status, /odom
  # ----------------------------------------------------------
  - name: "uitrasonic"
    supervisor: 1
    safety_system: 0
    nodes:
      - "uss_driver_publisher"
    watch_topics:
      - name: "/ultrasonic_eight"
        min_hz: 5.0

  # ----------------------------------------------------------
  # 8. navigation — Nav2 导航核心 + 辅助
  #    节点: controller_server, planner_server, bt_navigator,
  #          behavior_server, smoother_server, velocity_smoother,
  #          waypoint_follower, lifecycle_manager_navigation,
  #          map_server, global_costmap, local_costmap
  #    关键 topic:
  #      /cmd_vel_nav (controller_server 发布)
  #      /cmd_vel     (velocity_smoother, behavior_server 发布)
  #      /plan        (planner_server 发布)
  #      /map         (map_server 发布)
  #      /global_costmap/costmap, /local_costmap/costmap
  # ----------------------------------------------------------
  - name: "navigation"
    supervisor: 1
    safety_system: 2
    nodes:
      - "controller_server"
      - "planner_server"
      - "bt_navigator"
      - "behavior_server"
      - "smoother_server"
      - "velocity_smoother"
      - "waypoint_follower"
      - "lifecycle_manager_navigation"
      - "map_server"
      - "global_costmap/global_costmap"
      - "local_costmap/local_costmap"
    watch_topics:
      # - name: "/cmd_vel_nav"
      #   min_hz: 5.0
      # - name: "/cmd_vel"
      #   min_hz: 5.0
      - name: "/plan"
        # min_hz: 0.5
      - name: "/map"
        # min_hz: 0.001
      - name: "/global_costmap/costmap"
        # min_hz: 0.05
      - name: "/local_costmap/costmap"
        # min_hz: 2.0

  # ----------------------------------------------------------
  # 9. light-lm — FAST-LIO2 激光里程计/建图
  #    节点: /lio_node (lifecycle)
  #    发布: /fastlio2/body_cloud, /fastlio2/lio_odom, /fastlio2/lio_path
  #    订阅: /livox/imu, /livox/lidar
  # ----------------------------------------------------------
  - name: "light-lm"
    supervisor: 1
    safety_system: 2
    nodes: []
      # - "lio_node"
    watch_topics: []
      # - name: "/fastlio2/lio_odom"
      #   min_hz: 5.0
      # - name: "/fastlio2/body_cloud"
      #   min_hz: 5.0
    feedback_rules:
      - source_topic: "/drift_status"
        metric_name: "drift_state"
        min_value: 1.5
        max_value: 2.5
        level: "ERROR"
        max_stale_s: 2.0
        actions: ["safety_system"]
      - source_topic: "/drift_status"
        metric_name: "drift_delta_norm"
        max_value: 10.0
        level: "ERROR"
        max_stale_s: 2.0
        actions: ["safety_system"]

  # ----------------------------------------------------------
  # 10. localization_ekf — EKF 定位融合
  #     节点: /ekf_filter_node (robot_localization)
  #     发布: /odometry/filtered, /tf, /diagnostics
  #     订阅: /cmd_vel, /livox/imu, /odom_init, /set_pose

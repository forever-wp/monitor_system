nav2_monitor:
  ros__parameters:
    timeout: 5.0  # 节点/TF/反馈等通用超时时间（秒）
    scan_rate: 5.0  # 拓扑扫描频率（Hz），用于扫描节点、topic 发布者和 TF
    check_rate: 10.0  # 健康检查与状态发布频率（Hz）
    safety_cooldown_s: 2.0  # 安全动作重复发布冷却时间（秒）
    supervisor_cooldown_s: 5.0  # supervisor 重启命令重复发布冷却时间（秒）
    algorithm_feedback_topic: "/nav2_monitor/algorithm_feedback"  # 统一反馈输入 topic
    fault_event_topic: "/nav2_monitor/fault_event"  # 故障边沿事件输出 topic
    supervisor_cmd_topic: "/supervisor/cmd"  # supervisor 重启命令输出 topic
    safety_cmd_topic: "/safety_system/cmd"  # 安全执行命令输出 topic
    reporter.heartbeat_json_topic: "/nav2_monitor/reporter/heartbeat_json"  # 心跳 JSON 上报 topic
    reporter.event_json_topic: "/nav2_monitor/reporter/event_json"  # 事件 JSON 上报 topic
    reporter.cmd_correlation_window_s: 2.0  # reporter 关联安全/重启动作与事件的时间窗（秒）
    battery_state_topic: "/battery_state"  # 电池状态订阅 topic
    battery_state_timeout_s: 90.0  # 电池数据有效超时时间（秒）

    fault_config: "fault_detector_config.yaml"  # 默认故障检测配置文件路径（包内 config）
    fault_config_reload_enabled: true  # 是否启用故障配置热重载
    current_nav_task: "default"  # 当前导航任务名，用于选择任务对应 fault_config
    task_status_topic: "/task_status_code"  # 外层任务状态输入 topic（master_interfaces/TaskStatus），读取 status_code 后映射到 current_nav_task
    task_fault_configs.default: "fault_detector_config.yaml"  # default 任务使用的故障配置（包内 config）
    task_fault_configs.todoor: "profiles/fault_detector_todoor.yaml"  # todoor 任务故障配置（包内 config）
    task_fault_configs.elevator: "profiles/fault_detector_elevator.yaml"  # elevator 任务故障配置（包内 config）
    task_fault_configs.reverse: "profiles/fault_detector_reverse.yaml"  # reverse 任务故障配置（包内 config）
    task_status_code_mappings.100: "default"  # Task_Start -> default
    task_status_code_mappings.101: "default"  # OutDoor_Tasking -> default
    task_status_code_mappings.102: "default"  # InDoor_Tasking -> default
    task_status_code_mappings.103: "default"  # TaskReturn_Waiting -> default
    task_status_code_mappings.109: "default"  # Task_Complete -> default
    task_status_code_mappings.200: "elevator"  # Elevator_Waiting -> elevator
    task_status_code_mappings.201: "elevator"  # Elevator_In -> elevator
    task_status_code_mappings.202: "elevator"  # Elevator_Taking -> elevator
    task_status_code_mappings.203: "default"  # Elevator_Out -> elevator
    task_status_code_mappings.209: "elevator"  # Elevator_Arrived -> elevator
    task_status_code_mappings.300: "todoor"  # Door_Waiting -> todoor
    task_status_code_mappings.301: "todoor"  # DoorM_In -> todoor
    task_status_code_mappings.302: "todoor"  # DoorM_Out -> todoor
    task_status_code_mappings.303: "todoor"  # DoorA_In -> todoor
    task_status_code_mappings.304: "todoor"  # DoorA_Out -> todoor
    task_status_code_mappings.400: "default"  # ClampWater_Waiting -> default
    task_status_code_mappings.401: "default"  # ClampWater -> default
    task_status_code_mappings.402: "default"  # PlaceWater_Waiting -> default
    task_status_code_mappings.403: "default"  # PlaceWater -> default

    vehicle_status_file: "/home/ry/.ros/navigate_status/navigate_todoor_status.json"  # 导航状态 JSON 文件路径


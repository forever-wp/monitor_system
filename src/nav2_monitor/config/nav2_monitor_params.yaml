nav2_monitor:
  ros__parameters:
    timeout: 5.0
    scan_rate: 5.0
    check_rate: 10.0
    safety_cooldown_s: 2.0
    supervisor_cooldown_s: 5.0
    algorithm_feedback_topic: "/nav2_monitor/algorithm_feedback"
    fault_event_topic: "/nav2_monitor/fault_event"
    supervisor_cmd_topic: "/supervisor/cmd"
    safety_cmd_topic: "/safety_system/cmd"
    reporter.heartbeat_json_topic: "/nav2_monitor/reporter/heartbeat_json"
    reporter.event_json_topic: "/nav2_monitor/reporter/event_json"
    reporter.cmd_correlation_window_s: 2.0
    battery_state_topic: "/battery_state"
    battery_state_timeout_s: 90.0



    fault_config: "./src/nav2_monitor/config/fault_detector_config.yaml"
    fault_config_reload_enabled: true
    current_nav_task: "default"
    task_fault_configs.default: "./src/nav2_monitor/config/fault_detector_config.yaml"
    task_fault_configs.todoor: "./src/nav2_monitor/config/profiles/fault_detector_todoor.yaml"
    task_fault_configs.elevator: "./src/nav2_monitor/config/profiles/fault_detector_elevator.yaml"
    task_fault_configs.reverse: "./src/nav2_monitor/config/profiles/fault_detector_reverse.yaml"


    
    vehicle_status_file: "/home/ry/.ros/navigate_status/navigate_todoor_status.json"


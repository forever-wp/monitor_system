nav2_monitor:
  ros__parameters:
    timeout: 5.0
    scan_rate: 0.5
    check_rate: 1.0
    safety_cooldown_s: 2.0
    supervisor_cooldown_s: 5.0
    algorithm_feedback_topic: "/nav2_monitor/algorithm_feedback"
    battery_state_topic: "/battery_state"
    battery_state_timeout_s: 90.0
    fault_config: "/home/ry/ry_ws/modules/business_layer/business_layer_ws/src/nav2_monitor/config/fault_detector_config.yaml"
    vehicle_status_file: "/home/ry/.ros/navigate_status/navigate_todoor_status.json"


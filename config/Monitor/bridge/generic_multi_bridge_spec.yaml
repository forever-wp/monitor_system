bridges:
  - id: battery
    message_type: "sensor_msgs/msg/BatteryState"
    input_topic: "/battery_state"
    output_topic: "/nav2_monitor/algorithm_feedback"
    module_name: "battery_node"
    topic_name: "/battery_state"
    metrics:
      - name: "battery_percentage"
        field: "percentage"
        valid_field: "present"
      - name: "battery_temperature"
        field: "temperature"
        valid_field: "present"
      - name: "battery_voltage"
        field: "voltage"
        valid_field: "present"
  - id: drift_status
    message_type: "geometry_msgs/msg/PoseStamped"
    input_topic: "/drift_status"
    output_topic: "/nav2_monitor/algorithm_feedback"
    module_name: "light-lm"
    topic_name: "/drift_status"
    metrics:
      - name: "drift_state"
        field: "pose.position.x"
        valid_default: true
      - name: "drift_delta_norm"
        field: "pose.position.y"
        valid_default: true
      - name: "drift_reserved"
        field: "pose.position.z"
        valid_default: true

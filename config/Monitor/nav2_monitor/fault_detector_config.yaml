# ============================================================
# nav2_monitor 故障检测配置
# 基于实际系统节点/topic 信息 (2026-03-12)
# ============================================================

multi_value_judge:
  trigger_count: 2  # 同一规则连续异常多少次后才正式触发
  recover_count: 2  # 同一规则连续恢复多少次后才正式清除

# 事件法典规则：事件发现器只输出事实，最终执行由 EventCodexArbiter 统一仲裁。
# - rule_id/name: 规则唯一名称
# - when_all/when_any: 支持 event_key/fault_key 精确匹配，也支持 module、fault_type、fault_model、fault_name、prefix、contains、action 条件
# - execution_plan.targets: 可选 safety/nodemanager/none
# - execution_plan.safety.action: NONE/SLOW_DOWN/SOFT_STOP/EMERGENCY_STOP
# - execution_plan.nodemanager.modules: 需要交给 nodemanager 的模块列表
# - report_policy: 上报严重等级、人工接管建议和展示原因
event_codex_rules:
  - rule_id: "camera_and_lidar_missing"
    name: "camera_and_lidar_missing"
    when_all:
      - "usb_cam|topic_legacy:/front_camera/image_raw|action=0"
      - "livox|topic_legacy:/livox/points|action=1"
    execution_plan:
      targets: ["nodemanager"]
      nodemanager:
        modules: ["usb_cam", "livox"]
    report_policy:
      severity: "CRITICAL"
      reason: "Codex rule: front camera and livox points both unavailable"

# 需要持续监控的 TF 变换对，格式为 "parent->child"
target_transforms:
  - "map->odom"
  - "odom->base_link"

# ============================================================
# 碰撞检测（轻量版 LaserScan + 区域）
# ============================================================
collision_detection:
  enabled: 1  # 是否启用碰撞检测
  module_name: "collision_detection"  # 碰撞故障输出时使用的模块名
  scan_topic: "/collision_voxel_layer/scan"  # LaserScan 输入 topic
  pointcloud_topic: "/collision_voxel_layer/points"  # 已过滤/稀疏化 PointCloud2 输入；留空表示不使用
  voxel_topic: ""  # 默认不再使用旧 VoxelGrid，降低 collision_voxel_layer CPU 占用
  ultrasonic_topic: "/ultrasonic_eight_distance"  # 超声波 JSON 输入 topic
  prediction_speed_topic: "/cmd_vel"  # 动态 TTC 预测速度兼容主 topic；navigation 未单独配置时回退使用
  control_source_state_topic: "/control_source_state"  # 当前控制源状态 topic
  prediction_speed_navigation_topic: "/cmd_vel"  # 导航 TTC 预测速度 topic
  prediction_speed_miniapp_topic: "/cmd_vel_miniapp"  # 小程序 TTC 预测速度 topic
  prediction_speed_remote_topic: "/cmd_vel_remote"  # 远程驾驶 TTC 预测速度 topic
  prediction_speed_other_topic: "/cmd_vel_other"  # 其他控制源 TTC 预测速度 topic
  ttc_visualization_enabled: 1  # 是否发布 TTC 预测可视化 MarkerArray
  ultrasonic_distances_key: "distances"   # JSON 中 8 路距离数组的键名
  ultrasonic_blind_distance: 0.2  # 超声盲区下限，小于此值按该值处理
  ultrasonic_out_of_range_value: 1.0  # 超声超量程值，达到该值视为“无障碍点”
  pointcloud_height_filter_enabled: 0  # /collision_voxel_layer/points 已完成过滤/压缩，碰撞检测侧不再按 z 二次过滤
  pointcloud_min_height: 0.2  # 仅 pointcloud_height_filter_enabled=1 时生效：点云参与碰撞检测的最小高度（米）
  pointcloud_max_height: 1.4  # 仅 pointcloud_height_filter_enabled=1 时生效：点云参与碰撞检测的最大高度（米）
  # 稀疏点云由 collision_voxel_layer 负责过滤；collision_monitor 直接消费新鲜点，不再二次按高度/占用率过滤。
  source_timeout_s: 0.5  # 各碰撞数据源的有效超时时间（秒）
  source_level: "ERROR"  # 碰撞输入源缺失或超时时的故障等级；源异常时跳过 zone/ttc 判断
  source_actions: ["nodemanager"]  # 碰撞输入源异常触发后的动作列表
  direction_speed_threshold: 0.05  # 前后向判断阈值；绝对值低于该值时保持当前稳定方向，未建立稳定方向时仅匹配 both 区域（速度）
  direction_confirm_count: 3  # 方向切换确认帧数；连续收到相反方向速度达到该次数后才切换
  navigation_mode_switch_enabled: 1  # 启用 TTC 驱动的导航控制器模式切换；TTC 风险持续存在时切 SAFE，清除后恢复 FAST
  navigation_mode_topic: "/navigation_mode"  # 发布 FAST/SAFE 的状态话题；由导航侧接收后切换控制器
  navigation_fast_mode: "FAST"  # 默认高速控制器模式名；障碍清除并满足保持时间后发布
  navigation_safe_mode: "SAFE"  # 高避障控制器模式名；TTC 持续触发达到进入时间后发布
  navigation_safe_enter_duration_s: 0.15  # TTC 连续异常多久才进入 SAFE；用于过滤单帧点云噪声，同时保持快速响应
  navigation_safe_clear_duration_s: 1.0  # TTC 连续清除多久才允许退出 SAFE；用于避免障碍物边缘反复跳变
  navigation_safe_min_hold_s: 1.5  # 进入 SAFE 后最少保持时间；给高避障控制器足够接管和规划时间
  navigation_mode_publish_cooldown_s: 0.5  # FAST/SAFE 状态重复发布冷却时间；publisher 使用 transient_local，晚启动订阅者仍可拿到最近状态
  auto_footprint_zones_enabled: 1  # front_ttc/front_slow/front_stop 由 footprint 自动生成，避免手工框体歧义
  auto_footprint_zone_size_multiplier: 1.0  # 自动生成框体整体倍率；同时放大前向长度和左右宽度，关闭自动后改用 zones[].points 手动调框
  footprint_points: [-0.37, -0.28, -0.37, 0.28, 0.37, 0.28, 0.37, -0.28]  # 车体 footprint，用于 TTC 计算时扣除车体范围
  ultrasonic_widget: [0.9, 1.0, 0.9, 0.55, 0.25, 0.2, 0.25, 0.55]  # 1号左前，顺时针编号；前视和前侧更高
  # zones 字段说明：
  # - name: 区域唯一名称
  # - enabled: 是否启用该区域
  # - model: zone/ttc；ttc 表示动态 TTC 预警模型
  # - auto_footprint_zone: 可选 front_ttc/front_slow/front_stop；启用后 points 由 footprint 自动生成，SAFE 模式下可自动缩小
  # - auto_footprint_fast_scale/auto_footprint_safe_scale: 单区自动框前向长度，单位为车身长度倍数；不填时使用默认值
  # - auto_footprint_zone_size_multiplier: 单区自动框整体倍率；会叠乘全局 auto_footprint_zone_size_multiplier
  # - points: 多边形顶点，按 [x1, y1, x2, y2, ...] 展开；关闭 auto_footprint_zones_enabled 后可用 points 手动调框
  # - min_points: 命中阈值；对超声波/voxel 是加权点数，对 scan/pointcloud 是点数量/权重和
  # - level: 故障等级 WARNING/ERROR/CRITICAL
  # - safety_system: 0=NONE 1=SLOW_DOWN 2=SOFT_STOP 3=EMERGENCY_STOP
  # - safety_slow_down_percentage: 减速动作时的速度百分比
  # - time_before_collision: ttc 模型的 TTC 阈值（秒）
  # - actions: 触发后的动作列表，可选 safety_system/nodemanager
  # - visualize: 是否发布该区域的 PolygonStamped 可视化
  # - polygon_pub_topic: 区域可视化 topic
  zones:
    - name: "front_ttc"
      enabled: 1  # 启用前向接近预警区
      model: "ttc"  # 按动态 TTC 方式触发
      auto_footprint_zone: "front_ttc"  # 绕障基础框：FAST/SAFE 均为前向1个车身，作为动态 TTC 的固定下限
      navigation_safe_hold_zone: 1  # 当动态 TTC 前向范围小于基础框时，基础框作为 SAFE 下限接管；无速度预测时按 0 处理，减速动作按 actions 保留
      motion_direction: "forward"
      min_points: 3
      level: "WARNING"  # 触发时按 WARNING 上报
      safety_system: 1  # 触发后执行减速
      safety_slow_down_percentage: 50.0  # 减速到 50%
      time_before_collision: 3.0  # TTC 小于 3 秒时触发
      recover_time_before_collision: 3.5
      min_hold_time_s: 0.2
      ttc_horizon_s: 3.5
      corridor_margin: 0.10
      candidate_downsample_resolution: 0.08
      actions: ["safety_system"]  # 仅执行安全动作
      visualize: 1
      polygon_pub_topic: "/nav2_monitor/collision_zone/front_ttc_base"
    - name: "front_slow"
      enabled: 1
      auto_footprint_zone: "front_slow"  # FAST=前向1个车身；SAFE=前向0.5个车身
      motion_direction: "forward"
      min_points: 3
      level: "ERROR"
      safety_system: 1
      safety_slow_down_percentage: 10.0
      actions: ["safety_system"]
      visualize: 1
      polygon_pub_topic: "/nav2_monitor/collision_zone/front_slow"
    - name: "front_stop"
      enabled: 1
      auto_footprint_zone: "front_stop"  # FAST=前向0.5个车身；SAFE=前向0.35个车身
      motion_direction: "forward"
      min_points: 3
      level: "CRITICAL"
      safety_system: 2
      actions: ["safety_system"]
      visualize: 1
      polygon_pub_topic: "/nav2_monitor/collision_zone/front_stop"

# ============================================================
# 小车状态判断检测（全局）
# ============================================================
vehicle_state_judge:
  enabled: 1  # 是否启用小车状态判断检测
  module_name: "vehicle_state_judge"  # 小车状态异常输出时使用的模块名
  command_topic: "/command"  # 被监控的最终控制命令 topic，非零表示期望小车移动
  moto_topic: "/moto_info"  # 电机反馈 topic，IMU/odom 不可用时作为实际运动回退
  odom_topic: ""   # 可选实际运动来源，低于 IMU 优先级，高于 moto 回退
  imu_topic: "/livox/imu"  # IMU topic，作为小车是否真的在动的主判断依据
  source_timeout_s: 1.0  # 输入源数据超时时间（秒），超时后不再参与本轮判断
  idle_timeout_s: 30.0  # 无速度指令且实际不动持续多久后输出低优先级久停提示
  source_level: "ERROR"  # 数据源缺失或超时时的故障等级；源异常时跳过小车状态业务判断
  coast_grace_s: 1.0  # 指令归零后允许刹车惯性继续运动的宽限时间，超过才判定“无指令仍运动”
  command_speed_threshold: 0.05  # command 认为“有速度”的阈值
  moto_speed_threshold: 0.05  # moto 认为“有速度”的阈值
  odom_speed_threshold: 0.03  # odom 认为“有速度”的阈值
  imu_speed_threshold: 0.03  # IMU 积分速度认为“有速度”的阈值
  imu_yaw_rate_threshold: 0.08  # IMU 角速度认为“在转动”的阈值
  imu_static_command_threshold: 0.02  # 低于该命令速度时认为处于静止/可校准状态
  imu_bias_calibration_samples: 50  # IMU 偏置校准所需样本数
  imu_decay_rate: 0.98  # IMU 积分速度衰减系数
  anomaly_level: "ERROR"  # 指令与实际运动不一致时的故障等级
  source_actions: ["nodemanager"]  # 数据源异常触发后的动作列表
  idle_level: "WARNING"  # 运营阶段长时间静止提示的故障等级
  safety_system: 2  # 触发安全动作时默认执行 SOFT_STOP
  safety_slow_down_percentage: 50.0  # 若安全动作为减速时使用的百分比
  anomaly_actions: ["nodemanager"]  # 异常触发后的动作列表
  idle_actions: ["none"]  # 久停触发后的动作列表

# ============================================================
# 模块定义
# ============================================================
# modules 通用字段说明：
# - name: 模块唯一名称，作为故障 module_name 的来源
# - nodemanager: 1=该模块故障允许触发 /nodemanager/cmd
# - safety_system: 0/1/2/3，模块节点失活时默认对应的安全动作
# - safety_slow_down_percentage: 若 safety_system=1 时使用的减速百分比
# - nodes: 需要被监控在线状态的 ROS 节点名列表
# - watch_topics: 直接监控的真实 ROS topic 列表
#   - name: topic 名称
#   - type: 可选消息类型；不写时 topic_frequency_monitor 会从 ROS graph 自动发现
#   - min_hz: 期望最低频率；省略或注释掉表示只检查发布者存在
# - feedback_rules: 统一反馈规则列表
#   - source_topic: AlgorithmFeedback.topic_name
#   - metric_name: AlgorithmFeedback.metric_name
#   - min_value/max_value: 数值阈值
#   - min_hz: 最低反馈频率
#   - max_stale_s: 反馈最大允许陈旧时间
#   - level: WARNING/ERROR/CRITICAL
#   - actions: nodemanager/safety_system/none


modules:

  # ----------------------------------------------------------
  # 1. chassis_node — 底盘电机驱动
  #    节点: /chassis_node
  #    发布: /moto_info, /encoder_info, /is_emergency_stop
  #    订阅: /command, /joy
  # ----------------------------------------------------------
  - name: "chassis_node"
    nodemanager: 1
    safety_system: 2
    nodes:
      - "chassis_node"
    watch_topics:   # 若未配置 min_hz，则只检测有无，不做频率阈值判断
      - name: "/moto_info"
        #min_hz: 10.0
      - name: "/encoder_info"
        #min_hz: 10.0

  # ----------------------------------------------------------
  # 2. chassid_odometry_node — 底盘里程计
  #    节点: /odometry_node
  #    发布: /odom_init, /odom_base, /odom_vel, /tf, /wheel_velocity
  #    订阅: /moto_info, /is_emergency_stop
  # ----------------------------------------------------------
  - name: "chassid_odometry_node"
    nodemanager: 1
    safety_system: 2
    nodes:
      - "odometry_node"
    watch_topics:
      - name: "/odom_init"
        # min_hz: 10.0
      - name: "/odom_base"
        #min_hz: 5.0

  # ----------------------------------------------------------
  # 3. battery_node — 电池状态
  #    节点: /battery_node
  #    发布: /battery_state
  # ----------------------------------------------------------
  - name: "battery_node"
    nodemanager: 0
    safety_system: 2
    nodes:
      - "battery_node"
    watch_topics:
      - name: "/battery_state"
        # min_hz: 0.001
    # feedback_rules:
    #   - source_topic: "/battery_state"
    #     metric_name: "voltage"
    #     min_value: 20.0
    #     level: "WARNING"
    #     max_stale_s: 150.0
    #     actions: ["nodemanager"]
    #   - source_topic: "/battery_state"
    #     metric_name: "percentage"
    #     min_value: 0.10
    #     level: "ERROR"
    #     max_stale_s: 150.0
    #     actions: ["safety_system", "nodemanager"]

  # ----------------------------------------------------------
  # 4. livox — 激光雷达驱动 (livox MID-360)
  #    节点: /livox_lidar_publisher (livox_ros_driver2)
  #    发布: /livox/lidar (CustomMsg), /livox/imu (Imu)
  # ----------------------------------------------------------
  - name: "livox"
    nodemanager: 1
    safety_system: 2
    nodes:
      - "livox_lidar_publisher"   # 监测实际系统时替换为 "livox_lidar_publisher"
    watch_topics:
      - name: "/livox/points"
        min_hz: 5.0
      - name: "/livox/imu"
        # min_hz: 150.0

  # ----------------------------------------------------------
  # 5. usb_cam — USB 摄像头
  #    节点: /front_camera, /back_camera, /left_camera, /right_camera
  #    发布: /front_camera/image_raw, /back_camera/image_raw,
  #         /left_camera/image_raw, /right_camera/image_raw
  # ----------------------------------------------------------
  - name: "usb_cam"
    nodemanager: 0
    safety_system: 0
    nodes:
      - "front_camera"
      - "back_camera"
      #- "left_camera"
      #- "right_camera"
    watch_topics:
      - name: "/front_camera/image_raw"
        min_hz: 5.0
      - name: "/back_camera/image_raw"
        min_hz: 5.0
      #- name: "/left_camera/image_raw"
      #  min_hz: 5.0
      #- name: "/right_camera/image_raw"
      #  min_hz: 5.0

  # ----------------------------------------------------------
  # 6. rgbd_cam — RGBD 深度相机 (Orbbec)
  #    节点: /camera/camera (orbbec_camera_node)
  #    发布: /camera/color/image_raw, /camera/depth/image_raw
  # ----------------------------------------------------------
  - name: "rgbd_cam"
    nodemanager: 1
    safety_system: 2
    nodes:
      - "camera/camera"
    watch_topics:
      - name: "/camera/color/image_raw"
        # min_hz: 5.0
      - name: "/camera/depth/image_raw"
        # min_hz: 5.0

  # ----------------------------------------------------------
  # 7. uitrasonic — 超声波传感器 (8路聚合单 topic)
  #    节点: /uss_driver_publisher
  #    发布: /ultrasonic_eight (JSON: 场景 bool + 8 路距离数组)
  #    订阅: /elevator_status, /odom
  # ----------------------------------------------------------
  - name: "uitrasonic"
    nodemanager: 1
    safety_system: 0
    nodes: []
      #- "uss_driver_publisher"
    watch_topics: []
      # - name: "/ultrasonic_eight"
        # min_hz: 5.0

  # ----------------------------------------------------------
  # 8. navigation — Nav2 导航核心 + 辅助
  #    节点: controller_server, planner_server, bt_navigator,
  #          behavior_server, smoother_server, velocity_smoother,
  #          waypoint_follower, lifecycle_manager_navigation,
  #          map_server, global_costmap, local_costmap
  #    关键 topic:
  #      /cmd_vel_nav (controller_server 发布)
  #      /cmd_vel     (velocity_smoother, behavior_server 发布)
  #      /plan        (planner_server 发布)
  #      /map         (map_server 发布)
  #      /global_costmap/costmap, /local_costmap/costmap
  # ----------------------------------------------------------
  - name: "navigation"
    nodemanager: 1
    safety_system: 2
    nodes:
      - "controller_server"
      - "planner_server"
      - "bt_navigator"
      - "behavior_server"
      - "smoother_server"
      - "velocity_smoother"
      - "waypoint_follower"
      - "lifecycle_manager_navigation"
      - "map_server"
      - "global_costmap/global_costmap"
      - "local_costmap/local_costmap"
    watch_topics:
      # - name: "/cmd_vel_nav"
      #   min_hz: 5.0
      # - name: "/cmd_vel"
      #   min_hz: 5.0
      - name: "/plan"
        # min_hz: 0.5
      - name: "/map"
        # min_hz: 0.001
      - name: "/global_costmap/costmap"
        # min_hz: 0.05
      - name: "/local_costmap/costmap"
        # min_hz: 2.0

  # ----------------------------------------------------------
  # 9. light-lm — FAST-LIO2 激光里程计/建图
  #    节点: /lio_node (lifecycle)
  #    发布: /fastlio2/body_cloud, /fastlio2/lio_odom, /fastlio2/lio_path
  #    订阅: /livox/imu, /livox/lidar
  # ----------------------------------------------------------
  - name: "light-lm"
    nodemanager: 1
    safety_system: 2
    nodes: []
      # - "lio_node"
    watch_topics: []
      # - name: "/fastlio2/lio_odom"
      #   min_hz: 5.0
      # - name: "/fastlio2/body_cloud"
      #   min_hz: 5.0
    feedback_rules:
      - source_topic: "/drift_status"
        metric_name: "drift_state"
        min_value: 1.5
        max_value: 2.5
        level: "ERROR"
        max_stale_s: 200.0
        actions: ["nodemanager"]
      - source_topic: "/drift_status"
        metric_name: "drift_delta_norm"
        max_value: 10.0
        level: "ERROR"
        max_stale_s: 200.0
        actions: ["nodemanager"]

  # ----------------------------------------------------------
  # 10. localization_ekf — EKF 定位融合
  #     节点: /ekf_filter_node (robot_localization)
  #     发布: /odometry/filtered, /tf, /diagnostics
  #     订阅: /cmd_vel, /livox/imu, /odom_init, /set_pose
  # ----------------------------------------------------------
  - name: "localization_ekf"
    nodemanager: 1
    safety_system: 2
    nodes:
      - "ekf_filter_node"
    watch_topics:
      - name: "/odom"
        # min_hz: 10.0
      # - name: "/tf"
      #   min_hz: 10.0

  # ----------------------------------------------------------
  # 11. amcl — 全局重定位 (ICP localizer)

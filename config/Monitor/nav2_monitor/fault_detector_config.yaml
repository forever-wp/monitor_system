# ============================================================
# nav2_monitor 故障检测配置
# 基于实际系统节点/topic 信息 (2026-03-12)
# ============================================================

multi_value_judge:
  trigger_count: 2  # 同一规则连续异常多少次后才正式触发
  recover_count: 2  # 同一规则连续恢复多少次后才正式清除

# 需要持续监控的 TF 变换对，格式为 "parent->child"
target_transforms:
  - "map->odom"
  - "odom->base_link"

# ============================================================
# 碰撞检测（轻量版 LaserScan + 区域）
# ============================================================
collision_detection:
  enabled: 1  # 是否启用碰撞检测
  module_name: "collision_detection"  # 碰撞故障输出时使用的模块名
  scan_topic: "scan"  # LaserScan 输入 topic
  pointcloud_topic: "/livox/points"  # PointCloud2 输入 topic；留空表示不使用
  ultrasonic_topic: "/ultrasonic_eight_distance"  # 超声波 JSON 输入 topic
  prediction_speed_topic: "/cmd_vel"  # 提前减速（approach/TTC）使用的预测速度 topic
  ultrasonic_distances_key: "distances"   # JSON 中 8 路距离数组的键名
  ultrasonic_blind_distance: 0.2  # 超声盲区下限，小于此值按该值处理
  ultrasonic_out_of_range_value: 1.0  # 超声超量程值，达到该值视为“无障碍点”
  pointcloud_min_height: 0.2  # 点云参与碰撞检测的最小高度（米）
  pointcloud_max_height: 1.4  # 点云参与碰撞检测的最大高度（米）
  source_timeout_s: 0.5  # 各碰撞数据源的有效超时时间（秒）
  footprint_points: [-0.37, -0.28, -0.37, 0.28, 0.37, 0.28, 0.37, -0.28]  # 车体 footprint，用于 TTC 计算时扣除车体范围
  ultrasonic_widget: [0.9, 1.0, 0.9, 0.55, 0.25, 0.2, 0.25, 0.55]  # 1号左前，顺时针编号；前视和前侧更高
  # zones 字段说明：
  # - name: 区域唯一名称
  # - enabled: 是否启用该区域
  # - model: zone/approach；approach 表示 TTC 预警模型
  # - points: 多边形顶点，按 [x1, y1, x2, y2, ...] 展开
  # - min_points: 命中阈值；对超声波是加权点数，对 scan/pointcloud 是点数量/权重和
  # - level: 故障等级 WARNING/ERROR/CRITICAL
  # - safety_system: 0=NONE 1=SLOW_DOWN 2=SOFT_STOP 3=EMERGENCY_STOP
  # - safety_slow_down_percentage: 减速动作时的速度百分比
  # - time_before_collision: approach 模型的 TTC 阈值（秒）
  # - actions: 触发后的动作列表，可选 safety_system/supervisor
  # - visualize: 是否发布该区域的 PolygonStamped 可视化
  # - polygon_pub_topic: 区域可视化 topic
  zones:
    - name: "front_approach"
      enabled: 1  # 启用前向接近预警区
      model: "approach"  # 按 TTC 预估方式触发
      points: [1.2, 0.45, 1.2, -0.45, 0.2, -0.45, 0.2, 0.45]  # 区域轮廓
      level: "WARNING"  # 触发时按 WARNING 上报
      safety_system: 1  # 触发后执行减速
      safety_slow_down_percentage: 50.0  # 减速到 50%
      time_before_collision: 3.0  # TTC 小于 3 秒时触发
      actions: ["safety_system"]  # 仅执行安全动作
      visualize: 1  # 发布区域可视化
      polygon_pub_topic: "/nav2_monitor/collision_zone/front_approach"  # 可视化 topic
    - name: "front_slow"
      enabled: 1
      points: [0.8, 0.35, 0.8, -0.35, 0.2, -0.35, 0.2, 0.35]
      min_points: 3
      level: "ERROR"
      safety_system: 1
      safety_slow_down_percentage: 30.0
      actions: ["safety_system"]
      visualize: 1
      polygon_pub_topic: "/nav2_monitor/collision_zone/front_slow"
    - name: "front_stop"
      enabled: 1
      points: [0.5, 0.25, 0.5, -0.25, 0.0, -0.25, 0.0, 0.25]
      min_points: 3
      level: "CRITICAL"
      safety_system: 2
      actions: ["safety_system"]
      visualize: 1
      polygon_pub_topic: "/nav2_monitor/collision_zone/front_stop"

# ============================================================
# 底盘停留原地 / 反馈异常检测 (全局)
# ============================================================
chassis_stationary:
  enabled: 1  # 是否启用底盘异常/久停检测
  module_name: "chassis_stationary"  # 底盘故障输出时使用的模块名
  command_topic: "/command"  # 被监控的最终控制命令 topic
  moto_topic: "/moto_info"  # 电机反馈 topic，仅作为辅助旁证
  odom_topic: ""   # 已不作为主真值；保留可选回退
  imu_topic: "/livox/imu"  # IMU topic，作为底盘是否真的在动的主判断依据
  source_timeout_s: 1.0  # 输入源数据超时时间（秒）
  idle_timeout_s: 30.0  # command 和 moto 都静默多久后认为“久停”
  command_speed_threshold: 0.05  # command 认为“有速度”的阈值
  moto_speed_threshold: 0.05  # moto 认为“有速度”的阈值
  odom_speed_threshold: 0.03  # odom 认为“有速度”的阈值
  imu_speed_threshold: 0.03  # IMU 积分速度认为“有速度”的阈值
  imu_yaw_rate_threshold: 0.08  # IMU 角速度认为“在转动”的阈值
  imu_static_command_threshold: 0.02  # 低于该命令速度时认为处于静止/可校准状态
  imu_bias_calibration_samples: 50  # IMU 偏置校准所需样本数
  imu_decay_rate: 0.98  # IMU 积分速度衰减系数
  anomaly_level: "ERROR"  # command/moto 异常时的故障等级
  idle_level: "WARNING"  # 久停时的故障等级
  safety_system: 2  # 触发安全动作时默认执行 SOFT_STOP
  safety_slow_down_percentage: 50.0  # 若安全动作为减速时使用的百分比
  anomaly_actions: [ "supervisor"]  # 异常触发后的动作列表
  idle_actions: ["none"]  # 久停触发后的动作列表

# ============================================================
# 模块定义
# ============================================================
# modules 通用字段说明：
# - name: 模块唯一名称，作为故障 module_name 的来源
# - supervisor: 1=该模块故障允许触发 /supervisor/cmd
# - safety_system: 0/1/2/3，模块节点失活时默认对应的安全动作
# - safety_slow_down_percentage: 若 safety_system=1 时使用的减速百分比
# - nodes: 需要被监控在线状态的 ROS 节点名列表
# - watch_topics: 直接监控的真实 ROS topic 列表
#   - name: topic 名称
#   - min_hz: 期望最低频率；省略或注释掉表示只检查发布者存在
# - feedback_rules: 统一反馈规则列表
#   - source_topic: AlgorithmFeedback.topic_name
#   - metric_name: AlgorithmFeedback.metric_name
#   - min_value/max_value: 数值阈值
#   - min_hz: 最低反馈频率
#   - max_stale_s: 反馈最大允许陈旧时间
#   - level: WARNING/ERROR/CRITICAL
#   - actions: supervisor/safety_system/none
modules:

  # ----------------------------------------------------------
  # 1. chassis_node — 底盘电机驱动
  #    节点: /chassis_node
  #    发布: /moto_info, /encoder_info, /is_emergency_stop
  #    订阅: /command, /joy
  # ----------------------------------------------------------
  - name: "chassis_node"
    supervisor: 1
    safety_system: 2
    nodes:
      - "chassis_node"
    watch_topics:   # 若未配置 min_hz，则只检测有无，不做频率阈值判断
      - name: "/moto_info"
        min_hz: 10.0
      - name: "/encoder_info"
        min_hz: 10.0

  # ----------------------------------------------------------
  # 2. chassid_odometry_node — 底盘里程计
  #    节点: /odometry_node
  #    发布: /odom_init, /odom_base, /odom_vel, /tf, /wheel_velocity
  #    订阅: /moto_info, /is_emergency_stop
  # ----------------------------------------------------------
  - name: "chassid_odometry_node"
    supervisor: 1
    safety_system: 2
    nodes:
      - "odometry_node"
    watch_topics:
      - name: "/odom_init"
        # min_hz: 10.0
      - name: "/odom_base"
        min_hz: 10.0

  # ----------------------------------------------------------
  # 3. battery_node — 电池状态
  #    节点: /battery_node
  #    发布: /battery_state
  # ----------------------------------------------------------
  - name: "battery_node"
    supervisor: 0
    safety_system: 2
    nodes:
      - "battery_node"
    watch_topics:
      - name: "/battery_state"
        # min_hz: 0.001
    # feedback_rules:
    #   - source_topic: "/battery_state"
    #     metric_name: "voltage"
    #     min_value: 20.0
    #     level: "WARNING"
    #     max_stale_s: 150.0
    #     actions: ["supervisor"]
    #   - source_topic: "/battery_state"
    #     metric_name: "percentage"
    #     min_value: 0.10
    #     level: "ERROR"
    #     max_stale_s: 150.0
    #     actions: ["safety_system", "supervisor"]

  # ----------------------------------------------------------
  # 4. livox — 激光雷达驱动 (livox MID-360)
  #    节点: /livox_lidar_publisher (livox_ros_driver2)
  #    发布: /livox/lidar (CustomMsg), /livox/imu (Imu)
  # ----------------------------------------------------------
  - name: "livox"
    supervisor: 1
    safety_system: 2
    nodes:
      - "livox_lidar_publisher"   # 监测实际系统时替换为 "livox_lidar_publisher"
    watch_topics:
      - name: "/livox/points"
        min_hz: 5.0
      - name: "/livox/imu"
        # min_hz: 150.0

  # ----------------------------------------------------------
  # 5. usb_cam — USB 摄像头
  #    节点: /front_camera, /back_camera, /left_camera, /right_camera
  #    发布: /front_camera/image_raw, /back_camera/image_raw,
  #         /left_camera/image_raw, /right_camera/image_raw
  # ----------------------------------------------------------
  - name: "usb_cam"
    supervisor: 0
    safety_system: 0
    nodes:
      - "front_camera"
      - "back_camera"
      #- "left_camera"
      #- "right_camera"
    watch_topics:
      - name: "/front_camera/image_raw"
        min_hz: 5.0
      - name: "/back_camera/image_raw"
        min_hz: 5.0
      #- name: "/left_camera/image_raw"
      #  min_hz: 5.0
      #- name: "/right_camera/image_raw"
      #  min_hz: 5.0

  # ----------------------------------------------------------
  # 6. rgbd_cam — RGBD 深度相机 (Orbbec)
  #    节点: /camera/camera (orbbec_camera_node)
  #    发布: /camera/color/image_raw, /camera/depth/image_raw
  # ----------------------------------------------------------
  - name: "rgbd_cam"
    supervisor: 1
    safety_system: 2
    nodes:
      - "camera/camera"
    watch_topics:
      - name: "/camera/color/image_raw"
        # min_hz: 5.0
      - name: "/camera/depth/image_raw"
        # min_hz: 5.0

  # ----------------------------------------------------------
  # 7. uitrasonic — 超声波传感器 (8路聚合单 topic)
  #    节点: /uss_driver_publisher
  #    发布: /ultrasonic_eight (JSON: 场景 bool + 8 路距离数组)
  #    订阅: /elevator_status, /odom
  # ----------------------------------------------------------
  - name: "uitrasonic"
    supervisor: 1
    safety_system: 0
    nodes:
      - "uss_driver_publisher"
    watch_topics: []
      # - name: "/ultrasonic_eight"
        # min_hz: 5.0

  # ----------------------------------------------------------
  # 8. navigation — Nav2 导航核心 + 辅助
  #    节点: controller_server, planner_server, bt_navigator,
  #          behavior_server, smoother_server, velocity_smoother,
  #          waypoint_follower, lifecycle_manager_navigation,
  #          map_server, global_costmap, local_costmap
  #    关键 topic:
  #      /cmd_vel_nav (controller_server 发布)
  #      /cmd_vel     (velocity_smoother, behavior_server 发布)
  #      /plan        (planner_server 发布)
  #      /map         (map_server 发布)
  #      /global_costmap/costmap, /local_costmap/costmap
  # ----------------------------------------------------------
  - name: "navigation"
    supervisor: 1
    safety_system: 2
    nodes:
      - "controller_server"
      - "planner_server"
      - "bt_navigator"
      - "behavior_server"
      - "smoother_server"
      - "velocity_smoother"
      - "waypoint_follower"
      - "lifecycle_manager_navigation"
      - "map_server"
      - "global_costmap/global_costmap"
      - "local_costmap/local_costmap"
    watch_topics:
      # - name: "/cmd_vel_nav"
      #   min_hz: 5.0
      # - name: "/cmd_vel"
      #   min_hz: 5.0
      - name: "/plan"
        # min_hz: 0.5
      - name: "/map"
        # min_hz: 0.001
      - name: "/global_costmap/costmap"
        # min_hz: 0.05
      - name: "/local_costmap/costmap"
        # min_hz: 2.0

  # ----------------------------------------------------------
  # 9. light-lm — FAST-LIO2 激光里程计/建图
  #    节点: /lio_node (lifecycle)

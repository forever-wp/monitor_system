# ============================================================
# nav2_monitor 故障检测配置
# Reverse 任务安全配置模板：强化倒车后向保护
# ============================================================

multi_value_judge:
  trigger_count: 2
  recover_count: 2

# ============================================================
# 碰撞检测（轻量版 LaserScan + 区域）
# ============================================================
collision_detection:
  enabled: 1
  module_name: "collision_detection"
  scan_topic: "scan"
  pointcloud_topic: "/livox/points"
  ultrasonic_topic: "/ultrasonic_eight"
  prediction_speed_topic: "/cmd_vel"  # 提前减速（approach/TTC）使用的预测速度 topic
  ultrasonic_distances_key: "distances"   # 支持 {"distances":[8路]} 或 false,d1,d2,...,d8
  ultrasonic_blind_distance: 0.2        # 0.2 视为盲区下限，低于此值按 0.2 处理
  ultrasonic_out_of_range_value: 1.0    # 1.0 视为超出探测上限，不生成碰撞点
  pointcloud_min_height: 0.2
  pointcloud_max_height: 1.4
  source_timeout_s: 0.5
  ultrasonic_widget: [0.35, 0.35, 0.35, 0.7, 0.95, 1.0, 0.95, 0.7]  # 倒车任务：后向优先，侧后次之
  zones:
    - name: "rear_approach"
      enabled: 1
      model: "approach"
      points: [-0.2, 0.45, -0.2, -0.45, -1.0, -0.45, -1.0, 0.45]
      level: "WARNING"
      safety_system: 1
      safety_slow_down_percentage: 45.0
      time_before_collision: 3.0
      actions: ["safety_system"]
      visualize: 1
      polygon_pub_topic: "/nav2_monitor/collision_zone/rear_approach"
    - name: "rear_slow"
      enabled: 1
      points: [-0.05, 0.35, -0.05, -0.35, -0.75, -0.35, -0.75, 0.35]
      min_points: 2.0
      level: "ERROR"
      safety_system: 1
      safety_slow_down_percentage: 20.0
      actions: ["safety_system"]
      visualize: 1
      polygon_pub_topic: "/nav2_monitor/collision_zone/rear_slow"
    - name: "rear_stop"
      enabled: 1
      points: [0.0, 0.25, 0.0, -0.25, -0.45, -0.25, -0.45, 0.25]
      min_points: 1.5
      level: "CRITICAL"
      safety_system: 2
      actions: ["safety_system"]
      visualize: 1
      polygon_pub_topic: "/nav2_monitor/collision_zone/rear_stop"

# ============================================================
# 底盘停留原地 / 反馈异常检测 (全局)
# ============================================================
chassis_stationary:
  enabled: 1
  module_name: "chassis_stationary"
  command_topic: "/command_safety"
  moto_topic: "/moto_info"
  odom_topic: ""   # 可选；为空时底盘判断不依赖 odom
  source_timeout_s: 1.0
  idle_timeout_s: 30.0
  command_speed_threshold: 0.05
  moto_speed_threshold: 0.05
  odom_speed_threshold: 0.03
  anomaly_level: "ERROR"
  idle_level: "WARNING"
  safety_system: 2
  safety_slow_down_percentage: 50.0
  anomaly_actions: ["safety_system", "supervisor"]
  idle_actions: ["none"]

# ============================================================
# 模块定义
# ============================================================
modules:

  # ----------------------------------------------------------
  # 1. chassis_node — 底盘电机驱动
  #    节点: /chassis_node
  #    发布: /moto_info, /encoder_info, /is_emergency_stop
  #    订阅: /command, /joy
  # ----------------------------------------------------------
  - name: "chassis_node"
    supervisor: 1
    safety_system: 2
    nodes:
      - "chassis_node"
    watch_topics:   # 若未配置 min_hz，则只检测有无，不做频率阈值判断
      - name: "/moto_info"
        min_hz: 10.0
      - name: "/encoder_info"
        min_hz: 10.0

  # ----------------------------------------------------------
  # 2. chassid_odometry_node — 底盘里程计
  #    节点: /odometry_node
  #    发布: /odom_init, /odom_base, /odom_vel, /tf, /wheel_velocity
  #    订阅: /moto_info, /is_emergency_stop
  # ----------------------------------------------------------
  - name: "chassid_odometry_node"
    supervisor: 1
    safety_system: 2
    nodes:
      - "odometry_node"
    watch_topics:
      - name: "/odom_init"
        # min_hz: 10.0
      - name: "/odom_base"
        min_hz: 10.0

  # ----------------------------------------------------------
  # 3. battery_node — 电池状态
  #    节点: /battery_node
  #    发布: /battery_state
  # ----------------------------------------------------------
  - name: "battery_node"
    supervisor: 0
    safety_system: 2
    nodes:
      - "battery_node"
    watch_topics:
      - name: "/battery_state"
        # min_hz: 0.001
    # feedback_rules:
    #   - source_topic: "/battery_state"
    #     metric_name: "voltage"
    #     min_value: 20.0
    #     level: "WARNING"
    #     max_stale_s: 150.0
    #     actions: ["supervisor"]
    #   - source_topic: "/battery_state"
    #     metric_name: "percentage"
    #     min_value: 0.10
    #     level: "ERROR"
    #     max_stale_s: 150.0
    #     actions: ["safety_system", "supervisor"]

  # ----------------------------------------------------------
  # 4. livox — 激光雷达驱动 (livox MID-360)
  #    节点: /livox_lidar_publisher (livox_ros_driver2)
  #    发布: /livox/lidar (CustomMsg), /livox/imu (Imu)
  # ----------------------------------------------------------
  - name: "livox"
    supervisor: 1
    safety_system: 2
    nodes:
      - "livox_lidar_publisher"   # 监测实际系统时替换为 "livox_lidar_publisher"
    watch_topics:
      - name: "/livox/points"
        min_hz: 5.0
      - name: "/livox/imu"
        min_hz: 150.0

  # ----------------------------------------------------------
  # 5. usb_cam — USB 摄像头
  #    节点: /front_camera, /back_camera, /left_camera, /right_camera
  #    发布: /front_camera/image_raw, /back_camera/image_raw,
  #         /left_camera/image_raw, /right_camera/image_raw
  # ----------------------------------------------------------
  - name: "usb_cam"
    supervisor: 0
    safety_system: 0
    nodes:
      - "front_camera"
      - "back_camera"
      #- "left_camera"
      #- "right_camera"
    watch_topics:
      - name: "/front_camera/image_raw"
        min_hz: 5.0
      - name: "/back_camera/image_raw"
        min_hz: 5.0
      #- name: "/left_camera/image_raw"
      #  min_hz: 5.0
      #- name: "/right_camera/image_raw"
      #  min_hz: 5.0

  # ----------------------------------------------------------
  # 6. rgbd_cam — RGBD 深度相机 (Orbbec)
  #    节点: /camera/camera (orbbec_camera_node)
  #    发布: /camera/color/image_raw, /camera/depth/image_raw
  # ----------------------------------------------------------
  - name: "rgbd_cam"
    supervisor: 1
    safety_system: 2
    nodes:
      - "camera/camera"
    watch_topics:
      - name: "/camera/color/image_raw"
        # min_hz: 5.0
      - name: "/camera/depth/image_raw"
        # min_hz: 5.0

  # ----------------------------------------------------------
  # 7. uitrasonic — 超声波传感器 (8路聚合单 topic)
  #    节点: /uss_driver_publisher
  #    发布: /ultrasonic_eight (JSON: 场景 bool + 8 路距离数组)
  #    订阅: /elevator_status, /odom
  # ----------------------------------------------------------
  - name: "uitrasonic"
    supervisor: 1
    safety_system: 0
    nodes:
      - "uss_driver_publisher"
    watch_topics:
      - name: "/ultrasonic_eight"
        min_hz: 5.0

  # ----------------------------------------------------------
  # 8. navigation — Nav2 导航核心 + 辅助
  #    节点: controller_server, planner_server, bt_navigator,
  #          behavior_server, smoother_server, velocity_smoother,
  #          waypoint_follower, lifecycle_manager_navigation,
  #          map_server, global_costmap, local_costmap
  #    关键 topic:
  #      /cmd_vel_nav (controller_server 发布)
  #      /cmd_vel     (velocity_smoother, behavior_server 发布)
  #      /plan        (planner_server 发布)
  #      /map         (map_server 发布)
  #      /global_costmap/costmap, /local_costmap/costmap
  # ----------------------------------------------------------
  - name: "navigation"
    supervisor: 1
    safety_system: 2
    nodes:
      - "controller_server"
      - "planner_server"
      - "bt_navigator"
      - "behavior_server"
      - "smoother_server"
      - "velocity_smoother"
      - "waypoint_follower"
      - "lifecycle_manager_navigation"
      - "map_server"
      - "global_costmap/global_costmap"
      - "local_costmap/local_costmap"
    watch_topics:
      # - name: "/cmd_vel_nav"
      #   min_hz: 5.0
      # - name: "/cmd_vel"
      #   min_hz: 5.0
      - name: "/plan"
        # min_hz: 0.5
      - name: "/map"
        # min_hz: 0.001
      - name: "/global_costmap/costmap"
        # min_hz: 0.05
      - name: "/local_costmap/costmap"
        # min_hz: 2.0

  # ----------------------------------------------------------
  # 9. light-lm — FAST-LIO2 激光里程计/建图
  #    节点: /lio_node (lifecycle)
  #    发布: /fastlio2/body_cloud, /fastlio2/lio_odom, /fastlio2/lio_path
  #    订阅: /livox/imu, /livox/lidar
  # ----------------------------------------------------------
  - name: "light-lm"
    supervisor: 1
    safety_system: 2
    nodes: []
      # - "lio_node"
    watch_topics: []
      # - name: "/fastlio2/lio_odom"
      #   min_hz: 5.0
      # - name: "/fastlio2/body_cloud"
      #   min_hz: 5.0

  # ----------------------------------------------------------
  # 10. localization_ekf — EKF 定位融合
  #     节点: /ekf_filter_node (robot_localization)
  #     发布: /odometry/filtered, /tf, /diagnostics
